name: Attendance-TAG-BASED-DEPLOYMENT

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (qa or prod)"
        required: true
        default: "qa"
      tag:
        description: "Image tag to deploy"
        required: true

jobs:
  deploy:
    name: Deploy Attendance Service
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      # 1. Checkout
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Set TAG
      - name: Set TAG
        run: echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      # 3. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. Write ConfigMap (NO PRINT → prevents secret leak)
      - name: Write ConfigMap manifest
        run: |
          mkdir -p manifest
          echo "${{ secrets.ENV_FILE_CONTENT }}" | base64 -d > manifest/configmap.yaml

      # 5. Update Deployment Manifest (NO PRINT)
      - name: Update Deployment Manifest
        env:
          IMAGE_TAG: ${{ github.event.inputs.tag }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          envsubst < manifest/attendance-service.yaml > manifest/attendance-service-updated.yaml

      # 6. Deploy
      - name: Deploy to AWS EKS
        env:
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          NAMESPACE: ${{ github.event.inputs.environment == 'prod' && 'microservices' || 'microservices-qa' }}
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

          kubectl apply -f manifest/configmap.yaml -n $NAMESPACE
          kubectl apply -f manifest/attendance-service-updated.yaml -n $NAMESPACE

          kubectl rollout restart deployment attendancemanagement -n $NAMESPACE
          kubectl rollout status deployment attendancemanagement -n $NAMESPACE

          kubectl get pods -n $NAMESPACE -l app=attendancemanagement
